<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">E-Shop</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="catalog.html">Catalog</a></li>
                    <li><a href="product_details.html">Products</a></li>
                    <li><a href="login.html">Login</a></li>                    
                    <li><a href="checkout.html" class="cart-btn">Cart</a></li>
                </ul>
            </div>
        </nav>
        <main class="product-details-container">
            <div class="product-image">
                <img src="https://placehold.co/600x600" alt="Detailed Product View">
            </div>

            <div class="product-info">
                <h1>Premium Product Name</h1>
                <p class="price">$49.99</p>
                <p class="description">
                    This is a detailed description of your product. Talk about the materials, 
                    features, and why someone should buy it. Since this is an ecommerce site 
                    for your web design class, focus on clear, readable text.
                </p>
                
                <div class="purchase-options">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" value="1" min="1">
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>
        </main>
    </body>
</html>
